name: openclaw-mirosearch

services:
  app:
    build:
      context: .
      dockerfile: apps/gradio-demo/Dockerfile
      # 使用宿主机网络拉 apt / pip 包，规避 docker0 桥接网无法访问外部仓库的环境
      network: host
    image: openclaw-mirosearch:latest
    restart: unless-stopped
    network_mode: host
    env_file:
      - ${COMPOSE_ENV_FILE:-.env.compose}
    environment:
      HOST: 0.0.0.0
      PORT: ${APP_PORT:-8080}
      API_BASE_URL: ${GRADIO_API_BASE_URL:-http://127.0.0.1:${API_PORT:-8090}}
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:-http://127.0.0.1:${SEARXNG_HOST_PORT:-27080}}
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:${APP_PORT:-8080}/gradio_api/info', timeout=5).read()"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  api:
    build:
      context: .
      dockerfile: apps/api-server/Dockerfile
      # 使用宿主机网络拉 apt / pip 包，规避 docker0 桥接网无法访问外部仓库的环境
      network: host
    image: openclaw-mirosearch-api:latest
    restart: unless-stopped
    network_mode: host
    env_file:
      - ${COMPOSE_ENV_FILE:-.env.compose}
    environment:
      API_HOST: 0.0.0.0
      API_PORT: ${API_PORT:-8090}
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:-http://127.0.0.1:${SEARXNG_HOST_PORT:-27080}}
      VALKEY_HOST: 127.0.0.1
      VALKEY_PORT: ${VALKEY_PORT:-6379}
    depends_on:
      valkey:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:${API_PORT:-8090}/health', timeout=5).read()"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: apps/api-server/Dockerfile
      # 使用宿主机网络拉 apt / pip 包，规避 docker0 桥接网无法访问外部仓库的环境
      network: host
    image: openclaw-mirosearch-api:latest
    restart: unless-stopped
    network_mode: host
    env_file:
      - ${COMPOSE_ENV_FILE:-.env.compose}
    environment:
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:-http://127.0.0.1:${SEARXNG_HOST_PORT:-27080}}
      VALKEY_HOST: 127.0.0.1
      VALKEY_PORT: ${VALKEY_PORT:-6379}
    command: [".venv/bin/python", "worker.py"]
    working_dir: /workspace/apps/api-server
    healthcheck:
      test:
        - CMD
        - /workspace/apps/api-server/.venv/bin/python
        - /workspace/apps/api-server/worker_healthcheck.py
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      valkey:
        condition: service_healthy

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    network_mode: host
    command: ["valkey-server", "--save", "30", "1", "--loglevel", "warning"]
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "-h", "127.0.0.1", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5

  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    network_mode: host
    environment:
      GRANIAN_PORT: ${SEARXNG_HOST_PORT:-27080}
      SEARXNG_BASE_URL: ${SEARXNG_PUBLIC_BASE_URL:-http://localhost:${SEARXNG_HOST_PORT:-27080}/}
      SEARXNG_REDIS_URL: redis://127.0.0.1:${VALKEY_PORT:-6379}/0
    depends_on:
      valkey:
        condition: service_healthy
    volumes:
      - searxng-cache:/var/cache/searxng
      - ./deploy/searxng/settings.yml:/etc/searxng/settings.yml:ro
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:${SEARXNG_HOST_PORT:-27080}/healthz', timeout=5).read()"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  valkey-data:
  searxng-cache:
